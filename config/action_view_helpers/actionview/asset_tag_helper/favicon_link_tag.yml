---
name: favicon_link_tag
source: "ActionView::Helpers::AssetTagHelper#favicon_link_tag"
gem: actionview
output: html
visibility: public
supported: false
supports_block: false
description: |-
  Returns a `<link>` tag for a favicon managed by the asset pipeline. If a page has no link like the one generated by this helper, browsers ask for /favicon.ico automatically. Defaults to `"favicon.ico"` with rel `"icon"` and type `"image/x-icon"`.
signature: "favicon_link_tag(source = \"favicon.ico\", options = {})"
documentation_url: "https://api.rubyonrails.org/classes/ActionView/Helpers/AssetTagHelper.html#method-i-favicon_link_tag"
tag:
  name: link
  is_void: true
  preferred: false
  detect_style: call_name
  implicit_attribute:
    name: href
    source: first_arg
    wrapper: image_path
    skip_wrapping_for:
      - url
arguments:
  - name: source
    position: 1
    type: string
    optional: true
    default: "favicon.ico"
    description: "Path to the favicon file."
  - name: options
    position: 2
    type: hash
    optional: true
    default: "{}"
    description: "HTML attributes hash."
options:
  - name: type
    type: string
    description: |-
      MIME type of the favicon (e.g. `"image/x-icon"`).
  - name: rel
    type: string
    description: |-
      Link relation (defaults to `"icon"`).
special_behaviors: []
