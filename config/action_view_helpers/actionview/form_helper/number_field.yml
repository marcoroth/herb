    type: [string, symbol]
    optional: false
    description: "The name of the object."
  - name: method
    position: 2
    type: symbol
    optional: false
    description: "The attribute name on the object."
  - name: options
    position: 3
    type: hash
    optional: true
    default: "{}"
    description: "HTML attributes hash."
options:
  - name: min
    type: [string, number]
    description: "Minimum allowed value."
