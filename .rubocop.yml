AllCops:
  NewCops: enable
  SuggestExtensions: false
  TargetRubyVersion: 3.2
  Exclude:
    - 'pkg/**/*'
    - 'vendor/**/*'
    - 'tmp/**/*'
    - 'node_modules/**/*'
    - 'lib/herb/action_view/**/*'

Style/StringLiterals:
  Enabled: true
  EnforcedStyle: double_quotes

Style/MixinUsage:
  Exclude:
    - bin/compare
    - bin/compare-render
    - bin/compare-compile

Style/ClassAndModuleChildren:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/StringLiteralsInInterpolation:
  Enabled: true
  EnforcedStyle: double_quotes

Style/WordArray:
  Enabled: true
  EnforcedStyle: brackets

Style/SymbolArray:
  Enabled: true
  EnforcedStyle: brackets

Style/BlockDelimiters:
  Enabled: false

Style/GlobalVars:
  Exclude:
    - ext/herb/extconf.rb

Style/AccessorGrouping:
  Exclude:
    - lib/herb/errors.rb
    - lib/herb/ast/nodes.rb

Style/TrailingCommaInHashLiteral:
  EnforcedStyleForMultiline: diff_comma

Metrics/CyclomaticComplexity:
  Max: 15
  Exclude:
    - bench/**/*
    - lib/herb/ast/nodes.rb
    - lib/herb/cli.rb
    - lib/herb/engine.rb
    - lib/herb/engine/**/*.rb
    - lib/herb/prism_inspect.rb
    - lib/herb/project.rb
    - templates/template.rb

Metrics/MethodLength:
  Max: 20
  Exclude:
    - bench/**/*
    - bin/**/*
    - lib/herb/ast/nodes.rb
    - lib/herb/cli.rb
    - lib/herb/dev/server.rb
    - lib/herb/engine.rb
    - lib/herb/engine/**/*.rb
    - lib/herb/prism_inspect.rb
    - lib/herb/project.rb
    - templates/template.rb
    - test/fork_helper.rb
    - test/snapshot_utils.rb

Metrics/AbcSize:
  Exclude:
    - bench/**/*
    - bin/**/*
    - lib/herb/ast/node.rb
    - lib/herb/ast/nodes.rb
    - lib/herb/cli.rb
    - lib/herb/dev/server.rb
    - lib/herb/engine.rb
    - lib/herb/engine/**/*.rb
    - lib/herb/errors.rb
    - lib/herb/prism_inspect.rb
    - lib/herb/project.rb
    - lib/herb/token.rb
    - templates/template.rb
    - test/engine/action_view/action_view_test_helper.rb
    - test/engine/rails_compatibility_test.rb
    - test/fork_helper.rb
    - test/snapshot_utils.rb

Metrics/ClassLength:
  Exclude:
    - bin/**/*
    - lib/herb/cli.rb
    - lib/herb/configuration.rb
    - lib/herb/engine.rb
    - lib/herb/engine/**/*.rb
    - lib/herb/project.rb
    - lib/herb/visitor.rb
    - lib/herb/ast/nodes.rb
    - lib/herb/dev/server.rb
    - test/**/*_test.rb
    - templates/template.rb

Metrics/ModuleLength:
  Exclude:
    - test/**/*.rb
    - templates/**/*.rb
    - bin/lib/compare_helpers.rb
    - bench/**/*

Metrics/BlockLength:
  Max: 30
  Exclude:
    - Rakefile
    - "*.gemspec"
    - "**/*.rake"
    - lib/herb/cli.rb
    - lib/herb/project.rb
    - test/**/*_test.rb
    - bin/**/*

Metrics/ParameterLists:
  Exclude:
    - lib/herb/ast/node.rb
    - lib/herb/ast/nodes.rb
    - lib/herb/diff_operation.rb
    - lib/herb/engine/validators/security_validator.rb
    - lib/herb/errors.rb
    - lib/herb/parser_options.rb
    - lib/herb/prism_inspect.rb

Metrics/PerceivedComplexity:
  Exclude:
    - bench/**/*
    - bin/**/*
    - lib/herb/ast/nodes.rb
    - lib/herb/cli.rb
    - lib/herb/dev/server.rb
    - lib/herb/engine.rb
    - lib/herb/engine/**/*.rb
    - lib/herb/prism_inspect.rb
    - lib/herb/project.rb
    - templates/template.rb
    - test/**/*.rb

Layout/LineLength:
  Enabled: false

Layout/EmptyLines:
  Exclude:
    - lib/herb/ast/nodes.rb
    - lib/herb/errors.rb

Layout/EmptyLinesAroundModuleBody:
  Exclude:
    - lib/herb/ast/nodes.rb
    - lib/herb/errors.rb

Layout/EmptyLinesAroundClassBody:
  Exclude:
    - lib/herb/visitor.rb

Layout/FirstHashElementIndentation:
  EnforcedStyle: consistent

Layout/LeadingCommentSpace:
  Enabled: false

Security/Eval:
  Exclude:
    - Rakefile
    - lib/herb/cli.rb
    - test/**/*.rb
    - bin/erubi-render
    - bin/compare-render
    - bin/compare-render
    - bench/action_view/benchmark_helper.rb

Security/MarshalLoad:
  Exclude:
    - test/fork_helper.rb

Lint/UnderscorePrefixedVariableName:
  Exclude:
    - test/engine/secure_compiler_test.rb

Lint/UnusedMethodArgument:
  Exclude:
    - lib/herb/errors.rb

Style/IfUnlessModifier:
  Enabled: false

Style/DocumentDynamicEvalDefinition:
  Enabled: false
