title: "Helpers with variables and static HTML"
subtitle: "Mix of static HTML structure and helpers with dynamic values"
locals:
  nav_class: '"navbar"'
  root_url: '"/"'
  about_url: '"/about"'
  user_name: '"Alice"'
  profile_url: '"/profiles/1"'
  avatar_url: '"http://example.com/avatar.jpg"'
  signup_url: '"/signup"'
  demo_url: '"/demo"'
  trial_url: '"/trial"'
  sidebar_url: '"/sidebar"'
  page_title: '"Welcome"'
  page_description: '"The best platform."'
  cta_text: '"Get Started"'
  cta_url: '"/start"'
  learn_url: '"/learn"'
  feature_count: "3"
  features: >-
    [
      { image: "http://example.com/1.png", alt: "Feature 1", title: "Fast", description: "Lightning fast" },
      { image: "http://example.com/2.png", alt: "Feature 2", title: "Secure", description: "Built secure" },
      { image: "http://example.com/3.png", alt: "Feature 3", title: "Scalable", description: "Grows with you" },
    ]
  cta_class: '"cta"'
  cta_heading: '"Ready to get started?"'
  cta_button_text: '"Sign Up Free"'
  copyright_text: '"&copy; 2024 Example Corp"'
  privacy_url: '"/privacy"'
  terms_url: '"/terms"'
  contact_email: '"hello@myapp.com"'
  current_year: "2024"
  testimonial_author_1: '"Jane Smith"'
  testimonial_author_2: '"Bob Johnson"'
  starter_price: "9"
  pro_price: "29"
  user_count: '"10,000+"'
  twitter_url: '"https://twitter.com/myapp"'
  github_url: '"https://github.com/myapp"'
---
<div class="page">
  <header>
    <%= tag.nav class: nav_class do %>
      <%= link_to "Home", root_url %>
      <%= link_to "About", about_url, class: "nav-link" %>
      <%= link_to user_name, profile_url, class: "nav-link", data: { turbo_frame: "content" } %>
    <% end %>
  </header>

  <main>
    <%= turbo_frame_tag "content" do %>
      <%= tag.section class: "hero", id: :hero do %>
        <%= tag.h1 page_title %>
        <%= tag.p page_description %>
        <%= tag.div class: "actions" do %>
          <%= link_to cta_text, cta_url, class: ["btn", "btn-primary"] %>
          <%= link_to "Learn More", learn_url, class: "btn btn-secondary" %>
        <% end %>
      <% end %>

      <%= tag.section class: "features", data: { controller: "features", count: feature_count } do %>
        <%= tag.div class: "grid" do %>
          <% features.each do |feature| %>
            <%= tag.div class: "card" do %>
              <%= image_tag feature[:image], alt: feature[:alt], class: "card-img" %>
              <%= tag.h3 feature[:title] %>
              <%= tag.p feature[:description] %>
            <% end %>
          <% end %>
        <% end %>
      <% end %>

      <%= tag.section class: cta_class, data: { controller: "cta" } do %>
        <%= content_tag :div, class: "container" do %>
          <%= tag.h2 cta_heading %>
          <%= link_to cta_button_text, signup_url, class: "btn btn-lg" %>
        <% end %>
      <% end %>
    <% end %>

    <%= turbo_frame_tag "sidebar", src: sidebar_url, loading: "lazy" do %>
      <%= tag.div class: "skeleton" do %>
        <%= tag.div class: "skeleton-line" %>
        <%= tag.div class: "skeleton-line" %>
      <% end %>
    <% end %>
  </main>

  <footer>
    <%= tag.div class: "footer-content", data: { year: current_year } do %>
      <%= tag.div class: "footer-links" do %>
        <%= link_to "Privacy", privacy_url %>
        <%= link_to "Terms", terms_url %>
        <%= link_to contact_email, "mailto:#{contact_email}" %>
      <% end %>
      <%= tag.p copyright_text %>
    <% end %>
  </footer>
</div>
