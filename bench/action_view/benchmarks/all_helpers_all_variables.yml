title: "All helpers, all variables"
subtitle: "Every tag and value is dynamic — worst case for precompilation"
locals:
  container_class: '"page"'
  nav_class: '"navbar"'
  nav_controller: '"navigation"'
  home_text: '"Home"'
  home_url: '"/"'
  about_text: '"About"'
  about_url: '"/about"'
  user_name: '"Alice"'
  profile_url: '"/profiles/1"'
  link_class: '"nav-link"'
  frame_target: '"content"'
  section_class: '"hero"'
  section_id: '"hero"'
  heading: '"Welcome"'
  description: '"A demo page."'
  actions_class: '"actions"'
  cta_text: '"Get Started"'
  cta_url: '"/start"'
  cta_class: '"btn btn-primary"'
  secondary_text: '"Learn More"'
  secondary_url: '"/learn"'
  secondary_class: '"btn btn-secondary"'
  card_class: '"card"'
  card_controller: '"card"'
  card_index: "1"
  card_index_2: "2"
  image_url: '"http://example.com/1.png"'
  image_alt: '"Feature 1"'
  image_class: '"card-img"'
  image_url_2: '"http://example.com/2.png"'
  image_alt_2: '"Feature 2"'
  card_title: '"Fast"'
  card_description: '"Lightning fast"'
  card_title_2: '"Secure"'
  card_description_2: '"Built secure"'
  card_link_text: '"Read more"'
  card_link_class: '"card-link"'
  card_link_url: '"/features/1"'
  card_link_url_2: '"/features/2"'
  footer_class: '"footer"'
  copyright: '"2024 Example Corp"'
  privacy_text: '"Privacy"'
  privacy_url: '"/privacy"'
  terms_text: '"Terms"'
  terms_url: '"/terms"'
  sidebar_url: '"/sidebar"'
  skeleton_class: '"skeleton"'
  skeleton_line_class: '"skeleton-line"'
---
<%= tag.div class: container_class do %>
  <%= tag.nav class: nav_class, data: { controller: nav_controller } do %>
    <%= link_to home_text, home_url %>
    <%= link_to about_text, about_url, class: link_class %>
    <%= link_to user_name, profile_url, class: link_class, data: { turbo_frame: frame_target } %>
  <% end %>

  <%= turbo_frame_tag "main" do %>
    <%= tag.section class: section_class, id: section_id do %>
      <%= tag.h1 heading %>
      <%= tag.p description %>
      <%= tag.div class: actions_class do %>
        <%= link_to cta_text, cta_url, class: cta_class %>
        <%= link_to secondary_text, secondary_url, class: secondary_class %>
      <% end %>
    <% end %>

    <%= tag.div class: card_class, data: { controller: card_controller, index: card_index } do %>
      <%= image_tag image_url, alt: image_alt, class: image_class %>
      <%= tag.h3 card_title %>
      <%= tag.p card_description %>
      <%= link_to card_link_text, card_link_url, class: card_link_class %>
    <% end %>

    <%= tag.div class: card_class, data: { controller: card_controller, index: card_index_2 } do %>
      <%= image_tag image_url_2, alt: image_alt_2, class: image_class %>
      <%= tag.h3 card_title_2 %>
      <%= tag.p card_description_2 %>
      <%= link_to card_link_text, card_link_url_2, class: card_link_class %>
    <% end %>

    <%= content_tag :div, class: footer_class do %>
      <%= tag.span copyright %>
      <%= link_to privacy_text, privacy_url %>
      <%= link_to terms_text, terms_url %>
    <% end %>
  <% end %>

  <%= turbo_frame_tag "sidebar", src: sidebar_url, loading: "lazy" do %>
    <%= tag.div class: skeleton_class do %>
      <%= tag.div class: skeleton_line_class %>
      <%= tag.div class: skeleton_line_class %>
      <%= tag.div class: skeleton_line_class %>
    <% end %>
  <% end %>
<% end %>
