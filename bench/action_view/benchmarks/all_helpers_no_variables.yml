title: "All helpers, no variables"
subtitle: "Every value is a literal — best case for precompilation"
---
<div class="page">
  <header>
    <%= tag.nav class: "navbar" do %>
      <%= link_to "Home", "/" %>
      <%= link_to "About", "/about", class: "nav-link" %>
      <%= link_to "Contact", "/contact", class: "nav-link", data: { turbo_frame: "content" } %>
    <% end %>
  </header>

  <main>
    <%= turbo_frame_tag "content" do %>
      <%= tag.section class: "hero", id: :hero do %>
        <%= tag.h1 "Welcome to Our Site" %>
        <%= tag.p "This is a demo page with many Action View helpers." %>
        <%= tag.div class: "actions" do %>
          <%= link_to "Get Started", "/start", class: "btn btn-primary" %>
          <%= link_to "Learn More", "/learn", class: "btn btn-secondary" %>
        <% end %>
      <% end %>

      <%= tag.section class: "features", data: { controller: "features" } do %>
        <%= tag.div class: "grid" do %>
          <%= tag.div class: "card" do %>
            <%= image_tag "http://example.com/feature1.png", alt: "Feature 1", class: "card-img" %>
            <%= tag.h3 "Fast" %>
            <%= tag.p "Lightning fast performance" %>
          <% end %>

          <%= tag.div class: "card" do %>
            <%= image_tag "http://example.com/feature2.png", alt: "Feature 2", class: "card-img" %>
            <%= tag.h3 "Secure" %>
            <%= tag.p "Built with security in mind" %>
          <% end %>

          <%= tag.div class: "card" do %>
            <%= image_tag "http://example.com/feature3.png", alt: "Feature 3", class: "card-img" %>
            <%= tag.h3 "Scalable" %>
            <%= tag.p "Grows with your needs" %>
          <% end %>
        <% end %>
      <% end %>

      <%= tag.section class: "cta" do %>
        <%= content_tag :div, class: "container" do %>
          <%= tag.h2 "Ready to get started?" %>
          <%= link_to "Sign Up Free", "/signup", class: "btn btn-lg" %>
        <% end %>
      <% end %>
    <% end %>

    <%= turbo_frame_tag "sidebar", src: "/sidebar", loading: "lazy" do %>
      <%= tag.div class: "skeleton" do %>
        <%= tag.div class: "skeleton-line" %>
        <%= tag.div class: "skeleton-line" %>
      <% end %>
    <% end %>
  </main>

  <footer>
    <%= tag.div class: "footer-content" do %>
      <%= tag.div class: "footer-links" do %>
        <%= link_to "Privacy", "/privacy" %>
        <%= link_to "Terms", "/terms" %>
        <%= link_to "Contact", "mailto:hello@example.com" %>
      <% end %>
      <%= tag.p "&copy; 2024 Example Corp" %>
    <% end %>
  </footer>
</div>
